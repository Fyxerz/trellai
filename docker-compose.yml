services:
  trellai:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
      - SOCKET_URL=http://localhost:3001
      - SOCKET_PORT=3001
      - SOCKET_CORS_ORIGINS=${SOCKET_CORS_ORIGINS:-*}
      - TRELLAI_WORKSPACE_DIR=/home/trellai/.trellai/workspaces
    volumes:
      - trellai-data:/app/data
      - trellai-workspaces:/home/trellai/.trellai/workspaces
    restart: unless-stopped

volumes:
  trellai-data:
  trellai-workspaces:
